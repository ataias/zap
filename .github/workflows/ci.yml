name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - run: zig build test -Doptimize=${{ matrix.optimize }}

  test-shell-completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - run: sudo apt-get install -y fish zsh expect
      - run: zig build test-shell-completions

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - run: zig build -Dtarget=aarch64-linux
      - run: zig build -Dtarget=x86_64-macos
      - run: zig build -Dtarget=aarch64-macos
      - run: zig build -Dtarget=x86_64-windows
      - run: zig build -Dtarget=x86_64-freebsd
      - run: zig build -Dtarget=aarch64-freebsd
